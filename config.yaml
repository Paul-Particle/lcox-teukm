# config.yaml — DRAFT grouping (3rd pass; see DESIGN.md "integration rule")
#
# The old flat params.py regrouped by axis, with fields grouped into thematic
# sub-blocks. Rule: CAPEX follows integration — integral converters (engine,
# integrated reactor) carry CAPEX on the DRIVETRAIN with a thin/absent EnergySource;
# separable supply (containerized reactor, tender, swappable battery) carries CAPEX
# on the EnergySource, with its commodity price folded in. `type:` is the loader's
# cost-model discriminator. `# ?` marks an open choice. `cases:` is deferred.
#
# Units: energy kWh, power kW, time h, distance km, speed kn, mass kg, money US$.

# ============================================================ shared ====
shared:
  discount_rate: 0.08
  crew_cost_usd_yr: 90000.0        # loaded annual cost per crew member
  margins:
    weather: 0.20                  # energy reserve on a battery ship's pack
    sea: 0.15                      # power margin on installed propulsion
  # Per-case (NOT shared) — cases are Sobol-generated, so these vary per case:
  #   load_factor (0.80) + load_factor_imbalance (0.2) -> each case's `route`
  #   v_min_kn (5.0) / v_max_kn (22.0)                 -> the op_v_kn `optimize` axis

# ========================================================= platforms ====
platforms:
  container:
    cargo_unit: TEU                # the capacity & LCOT denominator unit (doubles as platform discriminator)
    capacity:    {gross: 3000.0, unit_mass_t: 12.0, deadweight_t: 41000.0}  # slots ; t/TEU laden ; cargo+energy mass budget
    capex:       {hull_usd: 45.0e6, life_yr: 25.0}
    resistance:  {p_ref_kw: 20000.0, v_ref_kn: 18.0}      # admiralty P~v^3 curve (hull)
    hotel_base_kw: 1500.0          # base hotel/reefer load; drivetrain/source deltas adjust it
    slot_limits: {batt_empty_usable_frac: 0.40, container_max_gross_t: 36.0}
    # batt_empty_usable_frac: slack batteries may take free before displacing cargo (stability/DG)
    # container_max_gross_t: effective per-TEU mass cap (ISO 30 t + routine ~20% marinized margin, folded in)

# ======================================================= drivetrains ====
# energy -> shaft, INCLUDING the integral powerplant's CAPEX (engine / integrated
# reactor). `converter` = that powerplant (engine | motor | reactor plant). overhead
# / operations / hotel_delta decompose onto the drivetrain here.
#
# propulsion_factor: itemized hull/propeller efficiency (physics multiplies them into
# one factor scaling propulsion power). hull_form/coating/routing are available to ANY
# modern ship (incl. fossil in this scenario); propeller(pods)/wider_eff(motor) are
# electric-only, so = 1.0 on mechanical drivetrains.
drivetrains:
  mechanical-fossil:
    type: mechanical
    efficiency: {drive: 0.48, hotel: 0.42}        # chemical->shaft (2-stroke) ; aux genset->hotel bus
    capex:      {converter_usd_per_kw: 400.0, life_yr: 25.0}   # converter = main engine
    overhead:   {slots: 120.0}                    # engine room + bunkers (container-specific: TEU slots)
    operations: {port_hours: 18.0, availability: 0.95, tug_usd_per_call: 5000.0, hotel_delta_kw: 0.0}
    propulsion_factor:
      hull_form:  0.92    # optimized hull form
      coating:    0.98    # anti-fouling coatings
      propeller:  1.00    # pods/large low-RPM props — electric only
      wider_eff:  1.00    # motor efficient across speed range — electric only
      routing:    0.96    # weather routing, trim/draft, on-time speed

  mechanical-nuclear:                              # integrated reactor, DIRECT drive
    type: mechanical
    efficiency: {drive: 0.30, hotel: 0.30}        # reactor thermal->shaft ; ->hotel bus
    capex:      {converter_usd_per_kw: 6000.0, life_yr: 25.0}   # converter = reactor + steam plant + shaft
    overhead:   {slots: 120.0}                    # ? fixed (reactor+shielding); reactor power is now optimizer-sized,
                                                  #   so this may want to scale with power (teu_per_mwe) like containerized
    operations: {port_hours: 18.0, availability: 0.95, tug_usd_per_call: 5000.0, hotel_delta_kw: 250.0}  # reactor crew/security
    propulsion_factor:
      hull_form:  0.92
      coating:    0.98
      propeller:  1.00    # mechanical (direct shaft) — no pod benefit
      wider_eff:  1.00
      routing:    0.96
    # reactor power (hence speed cap) sized by the optimizer; v_max bounds it.

  electric:                                        # bare motor (battery / containerized-reactor / tender)
    type: electric
    efficiency: {drive: 0.88, hotel: 0.97}        # electricity->shaft (motor) ; hotel off the bus (bypasses motor)
    capex:      {converter_usd_per_kw: 120.0, life_yr: 25.0}    # converter = motor
    overhead:   {slots: 30.0}                     # compact motors, no big engine/tanks
    operations: {port_hours: 16.0, availability: 0.97, tug_usd_per_call: 2000.0, hotel_delta_kw: -150.0}
    # tug lower: pods/azimuth thrusters need less tug assistance. hotel_delta: fewer engine-room engineers.
    propulsion_factor:
      hull_form:  0.92
      coating:    0.98
      propeller:  0.88    # large low-RPM props on pods, cleaner flow
      wider_eff:  0.96    # motor efficient across a wide speed range
      routing:    0.96

  electric-nuclear:                                # integrated reactor, ELECTRIC drive (reactor+gen+motor)
    type: electric
    efficiency: {generation: 0.30, drive: 0.88, hotel: 0.97}   # thermal->elec ; elec->shaft ; ->hotel bus
    capex:
      reactor_usd_per_kw: 6500.0   # reactor + steam + generator + power electronics
      reactor_life_yr: 30.0
      converter_usd_per_kw: 120.0  # motor
      life_yr: 25.0
    overhead:   {slots: 140.0}                    # ? reactor+shielding+switchboard; same scaling caveat as above
    operations: {port_hours: 16.0, availability: 0.95, tug_usd_per_call: 2000.0, hotel_delta_kw: 100.0}  # -150 electric + 250 reactor
    propulsion_factor:               # full electric stack — gets ALL the efficiency gains
      hull_form:  0.92
      coating:    0.98
      propeller:  0.88
      wider_eff:  0.96
      routing:    0.96

# =========================================================== sources ====
sources:
  # ---- thin commodity sources (just a price; energy_mass where it's carried) ----
  vlsfo:
    type: fuel
    price: {usd_per_t: 550.0, lhv_kwh_per_kg: 11.1}
    energy_mass_t: 3000.0          # onboard fuel deadweight (bunkers)
  e-methanol:
    type: fuel
    price: {usd_per_kwh_chem: 0.18}   # PLACEHOLDER pending a production model
    energy_mass_t: 3000.0          # ? methanol ~2x mass for equal range — reuse understates it (old TODO)
  fission-fuel:                    # for the integrated nuclear DRIVETRAINS; omit from a case for fueled-for-life
    type: fuel
    price: {usd_per_kwh_th: 0.012}    # HALEU cycle
    energy_mass_t: 0.0

  # ---- full separable-hardware sources (carry CAPEX + sizing; price folded in) ----
  lfp:
    type: battery
    capex:      {usd_per_kwh: 250.0, cycle_life: 4000.0, calendar_life_yr: 12.0}   # cost + amortization life (mirrors hull capex)
    energy:     {kwh_per_teu: 3000.0, pack_wh_per_kg: 130.0, dod: 0.90}   # 3 MWh/TEU ; system density ; usable depth
    efficiency: {charge: 0.97, discharge: 0.98}
    min_discharge_h: 0.0           # no power limit
    charge_usd_per_kwh: 0.09       # grid/shore price, folded in
  iron-air:
    type: battery
    capex:      {usd_per_kwh: 30.0, cycle_life: 10000.0, calendar_life_yr: 20.0}   # cost + amortization life (mirrors hull capex)
    energy:     {kwh_per_teu: 1500.0, pack_wh_per_kg: 30.0, dod: 0.95}    # ~half LFP density ; ~4x heavier
    efficiency: {charge: 0.55, discharge: 0.82}   # charge-limited chemistry (~0.45 round-trip)
    min_discharge_h: 50.0          # C/50 power limit -> can cap speed below the drivetrain's design (speed cap via source)
    charge_usd_per_kwh: 0.09
  containerized-reactor:           # replaces containers; electric drivetrain
    type: reactor
    capex:      {usd_per_kw: 5000.0, life_yr: 15.0}
    fuel:       {usd_per_kwh_th: 0.012}
    efficiency: {generation: 0.30}    # thermal -> electricity
    overhead:   {teu_per_mwe: 1.2}    # slot footprint, scales with optimizer-sized power, rounds up to 0.5 TEU
    hotel_delta_kw: 250.0             # reactor crew/security (onboard)
    pool:       {idle_h: 8.0, availability: 0.92}   # fleet-pooled utilization (owned == leased under this assumption)
  tender-reactor:                  # separate uncrewed vessel; tethers an electric ship
    type: reactor
    capex:      {usd_per_kw: 7000.0, hull_usd: 50.0e6, life_yr: 25.0}   # per-kW reactor + the tender vessel (ex-reactor)
    fuel:       {usd_per_kwh_th: 0.012}   # ? thorium ~one-time — candidate to fold into capex (fueled-for-life)
    efficiency: {generation: 0.45}        # sCO2
    parasitic_kw: 2500.0           # uncrewed DP station-keeping + cooling
    om_other_usd_yr: 4.0e6         # uncrewed remote ops + asset-loss insurance
    availability: 0.95
    tether:     {cable_efficiency: 0.96, cable_v_cap_kn: 16.0}   # cable_v_cap = source-imposed speed cap
    # reactor power optimizer-sized like the others; no ship-slot overhead (separate vessel);
    # ship-side hotel handled by the plain electric drivetrain (tender is uncrewed)

# ============================================================= cases ====
# A case = platform + drivetrain + [sources] + strategy + a per-case `route` block + the
# `optimize` / `sweep` axes. `strategy` names the function in strategies.py. `sources: []`
# models a fueled-for-life converter (no variable energy, no slow-steam incentive). All
# reactors (integrated, containerized, tender) are optimizer-sized.
#
# These eight are the hand-written SEED set (was nine; owned/leased reactor collapsed). The
# Sobol generator that fans these out over the parameter space (dozens–thousands of cases)
# is a later, programmatic step — these are its baselines, not the full population.
#
#   fossil          container + mechanical-fossil  + [vlsfo]                   fuel_burn
#   e-methanol      container + mechanical-fossil  + [e-methanol]              fuel_burn
#   lfp             container + electric           + [lfp]                     port_swap_battery
#   iron-air        container + electric           + [iron-air]                port_swap_battery
#   nuclear-direct  container + mechanical-nuclear + [fission-fuel]            reactor_direct
#   nuclear-int-el  container + electric-nuclear   + [fission-fuel]            reactor_electric_integrated
#   nuclear-cont    container + electric           + [containerized-reactor]   reactor_electric
#   tender          container + electric           + [lfp, tender-reactor]     tether_charge
#
# Each `route` carries only the fields its strategy reads (reactor_direct / _integrated read
# neither design_v_kn nor a storm buffer). `optimize` is the op_v_kn search (v_min..v_max);
# `sweep` traces LCOT vs D_max. NOTE crew_count and om_other_usd_yr residuals live on each
# Drivetrain's operations, not here (the tender's om_other lives on its source).
#
# PLACEHOLDER VALUES (not yet pinned anywhere) — flagged below, confirm before trusting runs:
#   design_v_kn 18.0 ; storm_duration_h 12.0 ; standoff_nm 200.0 ; idle_h 12.0 ;
#   op_v_kn axis 5..22 n=18 ; d_km sweep 500..18000 n=36.
cases:
  fossil:
    platform: container
    drivetrain: mechanical-fossil
    sources: [vlsfo]
    strategy: fuel_burn
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2, design_v_kn: 18.0}   # design_v_kn ?
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]                          # 5..22 n ?
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]                        # D_max range ?

  e-methanol:
    platform: container
    drivetrain: mechanical-fossil
    sources: [e-methanol]
    strategy: fuel_burn
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2, design_v_kn: 18.0}
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  lfp:
    platform: container
    drivetrain: electric
    sources: [lfp]
    strategy: port_swap_battery
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2, design_v_kn: 18.0, storm_duration_h: 12.0}
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  iron-air:
    platform: container
    drivetrain: electric
    sources: [iron-air]
    strategy: port_swap_battery
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2, design_v_kn: 18.0, storm_duration_h: 12.0}
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  nuclear-direct:
    platform: container
    drivetrain: mechanical-nuclear
    sources: [fission-fuel]
    strategy: reactor_direct
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2}    # reactor sized to op speed; no design_v_kn
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  nuclear-int-el:
    platform: container
    drivetrain: electric-nuclear
    sources: [fission-fuel]
    strategy: reactor_electric_integrated
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2}
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  nuclear-cont:
    platform: container
    drivetrain: electric
    sources: [containerized-reactor]
    strategy: reactor_electric
    route:    {load_factor: 0.80, load_factor_imbalance: 0.2, design_v_kn: 18.0}
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]

  tender:
    platform: container
    drivetrain: electric
    sources: [lfp, tender-reactor]
    strategy: tether_charge
    route:
      load_factor: 0.80
      load_factor_imbalance: 0.2
      design_v_kn: 18.0
      storm_duration_h: 12.0     # PLACEHOLDER
      standoff_nm: 200.0         # PLACEHOLDER
      idle_h: 12.0               # PLACEHOLDER
    optimize: [{param: op_v_kn, lo: 5.0, hi: 22.0, n: 18}]
    sweep:    [{param: d_km, lo: 500.0, hi: 18000.0, n: 36}]
