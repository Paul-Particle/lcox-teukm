# config.yaml — canonical model inputs for lcox-teukm (base case).
#
# Each key maps to a field of Params (see scripts/params.py). Unknown keys are
# rejected on load, so a typo here is an error rather than a silent default.
# All values are in the model's base units: energy kWh, power kW, time hours,
# distance km, speed knots, mass kg, money US$.

# ---- shared hull / route -------------------------------------------------
gross_slots: 3000.0          # nominal hull container capacity (TEU)
load_factor: 0.80            # avg fraction of available slots filled
load_factor_imbalance: 0.2   # headhaul/backhaul split (default asymmetric: head 0.96 / back 0.64)
hull_capex_usd: 45.0e+6      # newbuild hull excl. propulsion
discount_rate: 0.08
hull_life_yr: 25.0
port_hours_per_call: 18.0    # fossil/nuclear-direct berthing + cargo (conventional)
port_hours_elec: 16.0        # electric-drive: pods/azimuth -> faster berthing
availability: 0.95           # fraction of the year in service (fossil/nuclear)
availability_elec: 0.97      # battery/electric-drive: lower drivetrain maintenance (EV-like)
weather_reserve: 0.20        # route margin: extra leg energy for weather/headwinds (any battery ship)
deadweight_t: 41000.0        # total deadweight for cargo + onboard energy carrier (t)
cargo_t_per_teu: 12.0        # avg laden mass per TEU (full+empty mix)
bunker_mass_t: 3000.0        # fossil onboard fuel mass — explicit deadweight it carries
iso_container_max_gross_t: 30.0  # ISO 20ft max gross; caps energy per battery container
iso_container_margin: 0.20   # tolerance over ISO max for marinized/reinforced units

# ---- crew & port services (O&M itemized) ---------------------------------
crew_cost_usd_yr: 90000.0    # loaded annual cost per crew member
crew_count_fossil: 22.0
crew_count_elec: 20.0        # electric-drive: fewer engine-room engineers
crew_count_nuclear: 30.0     # reactor operators + security (also nuclear-electric)
tug_usd_per_call: 5000.0     # conventional berthing tug fees per port call
tug_usd_per_call_elec: 2000.0  # azimuth pods/thrusters -> much less tug assistance

# ---- powertrain sizing reference (admiralty-style P ~ v^3) ---------------
p_ref_kw: 20000.0            # propulsion power at v_ref
v_ref_kn: 18.0
p_hotel_kw: 1500.0           # baseline hotel/reefer load (fossil)
hotel_delta_elec_kw: -150.0  # electric: a few fewer engine-room engineers
hotel_delta_nuclear_kw: 250.0  # nuclear: more crew + security + reactor auxiliaries
v_design_max_kn: 22.0        # sizes the installed motor/engine
v_min_kn: 5.0
v_max_kn: 22.0

# ---- conversion efficiencies ---------------------------------------------
eta_fossil: 0.48             # fuel chemical -> useful (good 2-stroke)
eta_elec: 0.88               # battery pack -> useful (drivetrain)
eta_nuclear: 0.30            # reactor thermal -> useful (marine PWR steam ~25-30%)
eta_hotel: 0.97              # source bus -> hotel (bypasses drive motor on electric ships)
eta_aux_gen: 0.42            # fossil: aux genset fuel -> hotel electricity (below main-engine eta)

# ---- energy prices -------------------------------------------------------
fuel_usd_per_t: 550.0        # VLSFO
fuel_lhv_kwh_per_kg: 11.1    # ~40 MJ/kg
elec_usd_per_kwh: 0.09       # delivered industrial / shore power

# ---- fossil powertrain ---------------------------------------------------
engine_usd_per_kw: 400.0
engine_life_yr: 25.0
om_fossil_other_usd_yr: 1.52e+6    # NON-crew O&M: insurance, repairs, lube, stores (crew separate)
fossil_overhead_slots: 120.0 # engine room + bunkers, in slot-equivalents
fossil_propulsion_factor: 0.95  # smaller hull/coating/routing gain fossil can adopt

# ---- electric powertrain -------------------------------------------------
motor_usd_per_kw: 120.0
motor_life_yr: 25.0
om_elec_other_usd_yr: 1.2e+6       # NON-crew O&M: insurance, repairs (fewer parts), stores
elec_fixed_overhead_slots: 30.0  # compact motors only (no big engine/tanks)
# Electric-drive hull/propeller efficiency, itemized (product scales propulsion power;
# shared by LFP, iron-air, nuclear-electric, mobile). Conservative end of literature.
elec_hull_form_factor: 0.92  # optimized hull form (up to -20%)
elec_coating_factor: 0.98    # anti-fouling coatings (~-3%)
elec_propeller_factor: 0.88  # larger low-RPM props on pods (-15..20%)
elec_wider_eff_factor: 0.96  # motor efficient across wide speed range (-5..10%)
elec_routing_factor: 0.96    # weather routing, trim/draft (~-8%)
batt_empty_usable_frac: 0.40 # fraction of empty slack batteries may use before displacing
                             # cargo (DG/stability/access limits); 1.0 = use all slack first
battery_usd_per_kwh: 250.0   # installed, marinized system level
battery_kwh_per_teu: 3000.0  # energy per battery container (3 MWh/TEU)
battery_pack_wh_per_kg: 130.0  # LFP system density (conservative) -> battery mass (deadweight)
battery_dod: 0.90            # routine usable depth of discharge (below it = emergency)
battery_cycle_life: 4000.0
battery_calendar_life_yr: 12.0
battery_eta_charge: 0.97     # LFP grid -> stored
battery_eta_discharge: 0.98  # LFP stored -> delivered (round-trip ~0.95)
battery_min_discharge_h: 0.0 # rated discharge-duration floor; 0 = no power limit

# ---- iron-air battery powertrain ------------------------------------------
# Form Energy class 100-hour chemistry; shares hull, motor, drivetrain,
# electricity price, and swap logistics with the LFP ship. Sources: Form
# Energy ISO-NE 2024 deck (~40% AC-AC RTE, 100-h product, 20-yr life), Utility
# Dive (<$20/kWh chemistry target). Deadweight not enforced (model optimistic:
# iron-air is ~4x heavier per kWh than LFP at system level).
ironair_usd_per_kwh: 30.0    # installed system; chemistry target <$20/kWh + marine premium
ironair_kwh_per_teu: 1500.0  # ~half of LFP's 3 MWh/TEU (aqueous, lower density)
ironair_dod: 0.95            # routine usable depth (chemistry tolerates deep discharge)
ironair_cycle_life: 10000.0  # electrode claims >10k; non-binding at 100-h rates
ironair_calendar_life_yr: 20.0
ironair_eta_charge: 0.55     # iron-air grid -> stored; charge-limited chemistry
ironair_eta_discharge: 0.82  # iron-air stored -> delivered (round-trip ~0.45 AC-AC; split approx.)
ironair_min_discharge_h: 50.0  # C/50 sustained discharge (2x Form's C/100); see params.py rationale
ironair_pack_wh_per_kg: 30.0 # ~4x heavier than LFP; enforced as deadweight (bites long-haul)

# ---- nuclear powertrain ----------------------------------------------------
# Onboard SMR, no D_max-driven sizing. Sources: Lloyd's Register 2025
# containership study, peer-reviewed marine SMR economics ($5-8k/kWe near
# term; fleet-scale vendor targets $750-2000/kW), Carlson 2020 HALEU costs,
# KAIST/HD KSOE 15,000 TEU concept (reactor space ~ engine room or better).
nuclear_usd_per_kw: 6000.0   # installed reactor + steam plant + drivetrain, per useful kW
nuclear_life_yr: 25.0        # near-term marine SMR plant life
nuclear_fuel_usd_per_kwh_th: 0.012  # HALEU fuel cycle ~$12/MWh thermal
om_nuclear_other_usd_yr: 7.3e+6    # NON-crew: security, bespoke insurance, regulatory (crew separate)
nuclear_overhead_slots: 120.0  # reactor + shielding ~ conventional engine room

# ---- nuclear-electric powertrains (reactor -> electricity -> motor) ---------
# End-to-end eff = eta_nuclear*eta_elec (~0.26); reuse eta_*, motor_*, the
# electric propulsion-factor stack. (a) containerized modular units:
nucc_unit_kw: 30000.0        # net electric per AMPERA module (two-core 30 MWe)
nucc_usd_per_kw: 5000.0      # factory-built modular, below integrated
nucc_life_yr: 15.0           # swappable/leased modules refreshed sooner
nucc_overhead_slots_per_unit: 36.0  # AMPERA: two 40ft cores (4 TEU) + shielding all sides -> 36 TEU
nucc_om_other_usd_yr: 5.3e+6       # NON-crew residual (crew separate)
nucc_fuel_usd_per_kwh_th: 0.012     # HALEU, same as direct-drive
# leased containerized reactor (Reactor-as-a-Service): reactor CAPEX levelized over
# the reactor's pool utilization, not one ship's duty cycle. Speculative — sweep.
nucc_pool_idle_h: 8.0        # reactor wait in the shared pool between ship assignments
nucc_pool_availability: 0.92 # leased reactor's own uptime (maintenance/refuel rota)
# (b) integrated single reactor:
nuci_usd_per_kw: 6500.0      # adds generator + power electronics vs direct-drive
nuci_life_yr: 30.0
nuci_overhead_slots: 140.0   # reactor + shielding + switchboard
nuci_om_other_usd_yr: 7.3e+6       # NON-crew residual (crew separate)
nuci_fuel_usd_per_kwh_th: 0.012

# ---- mobile nuclear reactor tender (charges battery ships at sea) -----------
# Uncrewed micro-reactor tender (AMPERA-x class: thorium TRISO, subcritical, sCO2
# ~50%, two-core ~30 MWe, no refuel for decades). Dedicated escort: the ship runs
# untethered through coastal waters, then cables up at the border and crosses the
# open ocean tethered to the tender. Speculative — engineering estimates (sweep).
coastal_untethered_distance_nm: 12.0  # untethered battery run each end; 12 nm = UNCLOS minimum
                                   # (set 200.0 to test a full-EEZ standoff)
storm_survival_duration_h: 12.0    # worst-case at-sea disconnect; ship rides it out on battery
cable_efficiency: 0.96             # tether transmission efficiency (ship bus / reactor output)
mob_cable_v_cap_kn: 16.0           # max safe speed while cable-connected
mob_tender_reactor_kw: 30000.0     # AMPERA two-core net electric (15 MWe x 2)
mob_tender_parasitic_kw: 2500.0    # uncrewed; DP station-keeping + cooling (sCO2, no water)
mob_tender_usd_per_kw: 7000.0      # microreactor NOAK ~$7k/kWe (FOAK $10-35k — sweep)
mob_tender_capex_hull_usd: 50.0e+6 # small uncrewed DP vessel, ex-reactor (lean build)
mob_tender_life_yr: 25.0
mob_tender_om_other_usd_yr: 4.0e+6       # uncrewed: remote ops + asset-loss insurance; no crew/refuel
mob_tender_fuel_usd_per_kwh_th: 0.012  # thorium core, multi-decade ~one-time (negligible)
mob_tender_eta_nuclear: 0.45       # reactor thermal -> electric (sCO2 ~50%)
tender_idle_h: 5.0                 # tender-side "port-time equivalent": hours at the border between
                                   # dropping one ship and picking up the next; sets utilization
mob_tender_availability: 0.95      # decades without refuel, stays at sea; rare maintenance
mob_port_hours_per_call: 12.0      # no battery swap in port -> shorter than 18
