# studies.yaml — the case catalog + the studies. Each study picks member cases and, per parameter,
# how to probe the space and/or how to override that parameter's data.
#
# A study's `params:` maps a dotted config leaf to an entry with two independent parts:
#   probe:  how to vary it — {kind: sample|sweep|optimize, n: <grid points>}. Omitted -> fixed.
#           sample = Saltelli-drawn (variance-decomposed); sweep = retained condition grid;
#           optimize = grid collapsed to the optimum of `optimize_by`. `n` is grid points
#           (sweep/optimize); sampling uses `saltelli_sample_n`.
#   range:  a data override, deep-merged onto the assumptions leaf — {value, lo, hi, dist}. Sets or
#           overrides the nominal and/or the band + distribution. Bounds for any probe come from
#           this band (assumptions' if not overridden); `dist` doubles as grid spacing (unif ->
#           linear, loguniform -> geometric). A bare scalar == range: {value: scalar}.
#
# Study meta: cases (required — the member cases, by name), optimize_by (measure the lever
# optimizes, default lcot), minimize (argmin vs argmax, default true), decompose (Sobol targets;
# omitted -> optimize_by), saltelli_sample_n, second_order, infeasible_value.

# ============================================================= cases ====
# The composition catalog: which library parts (from assumptions.yaml) each ship concept combines.
# A case is `platform` + `drivetrain` (library keys) + `sources` (a list of keys — empty models a
# fueled-for-life converter) + `strategy` (the function in the strategies package). That is all a
# case IS — a composition; it holds no parameters of its own (the voyage operating point and the
# shared economics/design assumptions live on `shared` in assumptions.yaml). Studies select cases
# by name (or take all, in the order below).
cases:
  fossil:
    platform: container
    drivetrain: mechanical-fossil
    sources: [vlsfo]
    strategy: fuel_burn
  e-methanol:
    platform: container
    drivetrain: mechanical-fossil
    sources: [e-methanol]
    strategy: fuel_burn
  lfp:
    platform: container
    drivetrain: electric
    sources: [lfp]
    strategy: port_swap_battery
  iron-air:
    platform: container
    drivetrain: electric
    sources: [iron-air]
    strategy: port_swap_battery
  nuclear-direct:
    platform: container
    drivetrain: mechanical-nuclear
    sources: [fission-fuel]
    strategy: reactor_direct
  nuclear-int-el:
    platform: container
    drivetrain: electric-nuclear
    sources: [fission-fuel]
    strategy: reactor_electric_integrated
  nuclear-cont:
    platform: container
    drivetrain: electric
    sources: [containerized-reactor]
    strategy: reactor_electric
  tender:
    platform: container
    drivetrain: electric
    sources: [lfp, tender-reactor]
    strategy: tether_charge

studies:

  # --- fleet: all cases, speed lever, distance condition, no sampling -> a tidy comparison table.
  fleet:
    cases: [fossil, e-methanol, lfp, iron-air, nuclear-direct, nuclear-int-el, nuclear-cont, tender]
    optimize_by: lcot
    params:
      shared.op_v_kn: {probe: {kind: optimize, n: 18}, range: {lo: 5.0, hi: 22.0}}
      shared.d_km:    {probe: {kind: sweep,    n: 36}, range: {lo: 500.0, hi: 18000.0}}

  # --- validation: a single sampled param, nothing else varying -> S1 ~ ST ~ 1 -----------
  lfp-price-check:
    cases: [lfp]
    saltelli_sample_n: 512
    params:
      sources.lfp.capex.usd_per_kwh: {probe: {kind: sample}}   # band [150, 400] from assumptions

  # --- screening: tender reactor cost + weather detach fraction, as a function of route ----
  tender-screening:
    cases: [tender]
    optimize_by: lcot                             # decompose omitted -> decomposes lcot too
    saltelli_sample_n: 256
    second_order: false
    params:
      sources.tender-reactor.capex.usd_per_kw:   {probe: {kind: sample}}   # band [4000, 12000] from assumptions
      sources.tender-reactor.tether.detach_frac: {probe: {kind: sample}}   # band [0.0, 0.10]  from assumptions
      shared.op_v_kn: {probe: {kind: optimize, n: 18}, range: {lo: 5.0, hi: 22.0}}
      shared.d_km:    {probe: {kind: sweep,    n: 36}, range: {lo: 500.0, hi: 18000.0}}
